<!DOCTYPE html>
<html>
<head>
    <title>Founder BI Agent</title>
    <meta charset="UTF-8" />
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            display: flex;
            justify-content: center;
            margin-top: 40px;
        }

        .chat-container {
            width: 700px;
            background: white;
            border-radius: 10px;
            box-shadow: 0px 4px 20px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            height: 600px;
        }

        .header {
            padding: 15px;
            background: #2d3748;
            color: white;
            border-radius: 10px 10px 0 0;
            font-weight: bold;
        }

        .chat-box {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .message {
            margin-bottom: 15px;
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 8px;
        }

        .user {
            background: #3182ce;
            color: white;
            align-self: flex-end;
        }

        .bot {
            background: #edf2f7;
            align-self: flex-start;
        }

        .input-area {
            display: flex;
            padding: 10px;
            border-top: 1px solid #ddd;
        }

        input {
            flex: 1;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
            outline: none;
        }

        button {
            margin-left: 10px;
            padding: 10px 15px;
            border-radius: 6px;
            border: none;
            background: #2d3748;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #1a202c;
        }

        details {
            margin-top: 8px;
            font-size: 12px;
        }

        pre {
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .loading {
            font-style: italic;
            color: gray;
        }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="header">Founder BI Agent</div>

    <div id="chat" class="chat-box"></div>

    <div class="input-area">
        <input type="text" id="question" placeholder="Ask a business question..." />
        <button onclick="ask()">Ask</button>
    </div>
</div>

<script>
function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

async function ask() {
    const input = document.getElementById("question");
    const question = input.value.trim();
    if (!question) return;

    const chat = document.getElementById("chat");

    // Add user message
    const userMsg = document.createElement("div");
    userMsg.className = "message user";
    userMsg.innerHTML = escapeHtml(question);
    chat.appendChild(userMsg);

    input.value = "";
    chat.scrollTop = chat.scrollHeight;

    // Loading message
    const loadingMsg = document.createElement("div");
    loadingMsg.className = "message bot loading";
    loadingMsg.innerText = "Agent is thinking...";
    chat.appendChild(loadingMsg);
    chat.scrollTop = chat.scrollHeight;

    try {
        const response = await fetch("http://127.0.0.1:8000/ask", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ question: question })
        });

        const data = await response.json();
        console.log("FULL RESPONSE:", data);

        chat.removeChild(loadingMsg);

        // Check if answer exists
        const answerText = data.answer || "No insight available.";

        const botMsg = document.createElement("div");
        botMsg.className = "message bot";
        botMsg.innerHTML = `
            ${escapeHtml(answerText)}
            <details>
                <summary>View Agent Trace</summary>
                <pre>${escapeHtml(JSON.stringify(data.trace || [], null, 2))}</pre>
            </details>
        `;

        chat.appendChild(botMsg);
        chat.scrollTop = chat.scrollHeight;

    } catch (error) {
        chat.removeChild(loadingMsg);

        const errorMsg = document.createElement("div");
        errorMsg.className = "message bot";
        errorMsg.innerText = "Error connecting to server.";
        chat.appendChild(errorMsg);
    }
}
</script>

</body>
</html>
